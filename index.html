<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Signatures - La 1337</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-main: #121214;
            --bg-card: #1a1a1e;
            --border: #2a2a32;
            --accent: #00ff66;
            --text: #ffffff;
            --text-muted: #a0a0aa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            border-left: 3px solid var(--accent);
            padding-left: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        select {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 6px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--accent);
        }

        .btn {
            background: var(--accent);
            color: #000000;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
            width: 100%;
        }

        .btn:hover { opacity: 0.9; }

        .btn-zip {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            margin-top: 12px;
        }

        .btn-zip:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* zone prévisualisation */
        .preview-box {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #09090b;
            border: 1px dashed var(--border);
            padding: 20px;
            border-radius: 8px;
            min-height: 200px;
            margin-bottom: 15px;
        }

        /* STRUCTURE REALISTE DE LA SIGNATURE (600x150) */
        .signature-container {
            width: 600px;
            height: 150px;
            background: #000000;
            color: #ffffff;
            display: flex;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        .sig-banner {
            width: 250px;
            height: 150px;
            object-fit: cover;
        }

        .sig-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .sig-name {
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .sig-role {
            font-size: 13px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .sig-meta {
            font-size: 11px;
            color: #a0a0aa;
            line-height: 1.4;
        }

        /* Barre de chargement ZIP */
        #progress-bar {
            display: none;
            width: 100%;
            background: var(--bg-main);
            height: 6px;
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        #progress-fill {
            background: var(--accent);
            width: 0%;
            height: 100%;
            transition: width 0.1s;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- PANNEAU DE CONFIGURATION -->
        <div class="panel">
            <h2>Générateur La 1337 (V1)</h2>
            
            <div class="form-group">
                <label for="member-select">Sélectionner le membre de l'équipe</label>
                <select id="member-select" onchange="updateSignature()"></select>
            </div>

            <div class="form-group">
                <label for="banner-select">Style de la bannière gauche</label>
                <select id="banner-select" onchange="updateSignature()">
                    <option value="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400&q=80">Cyberpunk (Par défaut)</option>
                    <option value="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&q=80">Saison d'Été</option>
                    <option value="https://images.unsplash.com/photo-1508349682734-1828d7165187?w=400&q=80">Halloween</option>
                    <option value="https://images.unsplash.com/photo-1544816155-12df9643f363?w=400&q=80">Fêtes de Noël</option>
                </select>
            </div>

            <button class="btn" onclick="downloadSignature()">Télécharger la signature PNG</button>
            <button class="btn btn-zip" onclick="generateAllSignaturesZip()">Télécharger le Pack ZIP complet</button>
            
            <div id="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <!-- PANNEAU DE PREVISUALISATION -->
        <div class="panel">
            <h2>Prévisualisation en direct</h2>
            <div class="preview-box">
                <!-- C'est ce bloc exact qui sera pris en photo -->
                <div id="signature-element"></div>
            </div>
            <p style="font-size: 0.85rem; color: var(--text-muted); text-align: center;">Taille réelle de l'export : 600px x 150px</p>
        </div>
    </div>

    <script>
        // Ta base de données de l'équipe
        const teamMembers = [
            { name: "Maxime", role: "Directeur d'Antenne", mail: "maxime@la1337.fr", phone: "06 00 00 00 01" },
            { name: "Lucas", role: "Animateur - Drive", mail: "lucas@la1337.fr", phone: "06 00 00 00 02" },
            { name: "Sarah", role: "Journaliste", mail: "sarah@la1337.fr", phone: "06 00 00 00 03" },
            { name: "Thomas", role: "Technicien Réseau", mail: "thomas@la1337.fr", phone: "06 00 00 00 04" }
        ];

        // Remplissage du sélecteur au démarrage
        const select = document.getElementById('member-select');
        teamMembers.forEach((member, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = `${member.name} (${member.role})`;
            select.appendChild(option);
        });

        // Fonction pour mettre à jour la prévisualisation
        function updateSignature() {
            const memberIndex = document.getElementById('member-select').value;
            const member = teamMembers[memberIndex];
            const bannerUrl = document.getElementById('banner-select').value;
            const container = document.getElementById('signature-element');

            container.innerHTML = `
                <div class="signature-container">
                    <img class="sig-banner" src="${bannerUrl}" alt="banner" crossOrigin="anonymous">
                    <div class="sig-content">
                        <div class="sig-name">${member.name}</div>
                        <div class="sig-role">${member.role}</div>
                        <div class="sig-meta">
                            🌐 www.la1337.fr<br>
                            ✉️ ${member.mail}<br>
                            📞 ${member.phone}
                        </div>
                    </div>
                </div>
            `;
        }

        // Premier affichage automatique
        updateSignature();

        // Téléchargement unitaire
        function downloadSignature() {
            const container = document.getElementById('signature-element').querySelector('.signature-container');
            const currentMember = teamMembers[document.getElementById('member-select').value];
            const cleanName = currentMember.name.toLowerCase();

            html2canvas(container, { width: 600, height: 150, scale: 2, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = `signature-${cleanName}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        // Génération automatique du ZIP global
        function generateAllSignaturesZip() {
            const zip = new JSZip();
            const progressBar = document.getElementById('progress-bar');
            const progressFill = document.getElementById('progress-fill');
            const selectMenu = document.getElementById('member-select');
            
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            
            let index = 0;

            function processNext() {
                if (index >= teamMembers.length) {
                    zip.generateAsync({type: 'blob'}).then(function(content) {
                        const link = document.createElement('a');
                        link.download = "signatures-equipe-la1337.zip";
                        link.href = URL.createObjectURL(content);
                        link.click();
                        progressBar.style.display = 'none';
                        updateSignature(); // Remet le visuel propre
                    });
                    return;
                }

                selectMenu.value = index;
                updateSignature();

                setTimeout(function() {
                    const container = document.getElementById('signature-element').querySelector('.signature-container');
                    html2canvas(container, { width: 600, height: 150, scale: 2, useCORS: true }).then(function(canvas) {
                        var cleanName = teamMembers[index].name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '-');
                        var dataUrl = canvas.toDataURL('image/png');
                        var base64Data = dataUrl.split(',')[1];

                        zip.file(`signature-${cleanName}.png`, base64Data, { base64: true });
                        index++;
                        progressFill.style.width = (index / teamMembers.length) * 100 + '%';
                        processNext();
                    });
                }, 100);
            }

            processNext();
        }
    </script>
</body>
</html>
