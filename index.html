<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LA 1337 - Studio Signature Mail</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f12;
            color: #fff;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .wrapper {
            max-width: 850px;
            margin: 0 auto;
            background: #1a1a22;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid #2a2a35;
            position: relative;
        }
        h1 {
            color: #ff3366;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 5px 0;
            font-size: 28px;
        }
        .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* NAVIGATION MENU */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            border-bottom: 1px solid #2a2a35;
            padding-bottom: 15px;
        }
        .tab-btn {
            background: #0d0d12;
            color: #888899;
            border: 1px solid #2a2a35;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn:hover { color: #fff; border-color: #ff3366; }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff3366, #ff66cc);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3);
        }

        /* SECTIONS */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* FORMULAIRE & APERÇU */
        .form-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
            text-align: left;
        }
        .input-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }
        label {
            font-size: 11px;
            color: #ff3366;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        input, select {
            background: #0d0d12;
            border: 1px solid #333344;
            color: #fff;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
        }

        .preview-header {
            text-align: left;
            font-weight: bold;
            color: #888;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }
        .preview-area {
            background: #252530;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px dashed #444455;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .actions-container { display: flex; gap: 15px; margin-bottom: 25px; }
        .btn-download {
            background: linear-gradient(135deg, #ff3366, #ff66cc);
            color: #fff;
            border: none;
            padding: 16px 40px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 15px;
            flex: 1;
        }
        .btn-bulk { background: linear-gradient(135deg, #33cc99, #139975); }

        /* CHANGELOG MODULE */
        .changelog-container { text-align: left; display: flex; flex-direction: column; gap: 20px; }
        .changelog-card { background: #0d0d12; border: 1px solid #2a2a35; border-radius: 12px; padding: 20px 25px; }
        .changelog-card.latest { border-color: #ff3366; box-shadow: 0 0 15px rgba(255, 51, 102, 0.15); }
        .changelog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #1a1a22; padding-bottom: 10px; }
        .version-badge { background: #ff3366; color: #fff; font-weight: bold; font-size: 12px; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .version-badge.old { background: #444455; }
        .version-date { color: #888899; font-size: 12px; font-weight: 600; }
        .changelog-list { margin: 0; padding-left: 20px; color: #d1d1e0; font-size: 13px; line-height: 1.7; }
        .changelog-list li::marker { color: #ff3366; }

        /* FOOTER */
        .version-tag {
            font-size: 11px;
            color: #666677;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-top: 15px;
            border-top: 1px solid #2a2a35;
            padding-top: 15px;
        }
        .version-tag span { color: #ff3366; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>🎙️ LA 1337 RADIO 🎙️</h1>
    <div class="subtitle">Studio de Création de Signatures Mail</div>
    
    <!-- NAVIGATION -->
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('tab-generator', this)">🎨 Générateur</button>
        <button class="tab-btn" onclick="switchTab('tab-changelog', this)">📜 Mises à jour & Nouveautés</button>
    </div>

    <!-- ONGLET 1 : GÉNÉRATEUR -->
    <div id="tab-generator" class="tab-content active">
        <div class="form-container">
            <div class="input-group full-width">
                <label style="color: #33cc99;">🎨 Style de Signature</label>
                <select id="inSigStyle">
                    <option value="radio">🎧 Signature Officielle Graphique</option>
                    <option value="baweb_line">📄 Signature Simple (Ligne complète)</option>
                    <option value="baweb_minimal">✉️ Signature Minimaliste</option>
                </select>
            </div>
            <div class="input-group">
                <label>👤 Membre de l'équipe</label>
                <select id="inMemberSelect"></select>
            </div>
        </div>

        <div class="preview-header">Aperçu :</div>
        <div class="preview-area">
            <div id="sigPreview" style="width: 650px; height: 135px; background: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=1000&q=80') center/cover; border-radius: 12px; padding: 20px 25px; box-sizing: border-box;">
                <table cellpadding="0" cellspacing="0" style="width: 100%; height: 100%; border-collapse: collapse; text-align: left; font-family: 'Segoe UI', Arial, sans-serif; color: #ffffff;">
                    <tr>
                        <td style="width: 110px; vertical-align: middle; border-right: 3px solid #ff3366; padding-right: 15px;">
                            <img src="https://via.placeholder.com/150x50/ffffff/000000?text=LA+1337" alt="LA 1337" style="width: 95px; height: auto;">
                        </td>
                        <td style="vertical-align: middle; padding-left: 20px;">
                            <div style="font-size: 21px; font-weight: bold; color: #ff3366;">Prénom NOM</div>
                            <div style="font-size: 13px; font-weight: bold; color: #e1e1e6; font-style: italic; margin-bottom: 15px;">Votre Rôle / Poste</div>
                        </td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="actions-container">
            <button class="btn-download">📸 Télécharger la Signature (PNG)</button>
            <button class="btn-download btn-bulk">⚡ Générer TOUT le ZIP</button>
        </div>
    </div>

    <!-- ONGLET 2 : HISTORIQUE DES MISES À JOUR (GENERÉ VIA JS) -->
    <div id="tab-changelog" class="tab-content">
        <div class="changelog-container" id="changelogList">
            <!-- Rempli automatiquement depuis changelog.js -->
        </div>
    </div>

    <!-- PIED DE PAGE AUTOMATISÉ -->
    <div class="version-tag" id="footerVersion">
        <!-- Rempli automatiquement -->
    </div>
</div>

<!-- CHARGEMENT DU FICHIER DES MISES À JOUR -->
<script src="changelog.js"></script>

<script>
    function switchTab(tabId, btnElement) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btnElement.classList.add('active');
    }

    /* RENDER AUTOMATIQUE DU CHANGELOG */
    function renderChangelog() {
        const container = document.getElementById('changelogList');
        const footer = document.getElementById('footerVersion');
        
        if (!typeof CHANGELOG_DATA === 'undefined' || CHANGELOG_DATA.length === 0) return;

        container.innerHTML = '';
        
        CHANGELOG_DATA.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = `changelog-card ${item.isLatest ? 'latest' : ''}`;
            
            const badgeClass = item.isLatest ? 'version-badge' : 'version-badge old';
            const badgeText = item.isLatest ? `${item.version} (Actuelle)` : item.version;
            
            let changesList = item.changes.map(change => `<li>${change}</li>`).join('');

            card.innerHTML = `
                <div class="changelog-header">
                    <span class="${badgeClass}">${badgeText}</span>
                    <span class="version-date">${item.date}</span>
                </div>
                <ul class="changelog-list">
                    ${changesList}
                </ul>
            `;
            container.appendChild(card);

            // Mise à jour du footer avec la dernière version disponible
            if (index === 0) {
                footer.innerHTML = `Version <span>${item.version}</span> — Mis à jour le ${item.date}`;
            }
        });
    }

    window.onload = function() {
        renderChangelog();
    };
</script>

</body>
</html>
