<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LA 1337 - Générateur Signature Mail</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f12;
            color: #fff;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .wrapper {
            max-width: 850px;
            margin: 0 auto;
            background: #1a1a22;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid #2a2a35;
        }
        h1 {
            color: #ff3366;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 5px 0;
            font-size: 28px;
        }
        .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
            text-align: left;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        .full-width {
            grid-column: span 2;
        }
        label {
            font-size: 11px;
            color: #ff3366;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        input, select {
            background: #0d0d12;
            border: 1px solid #333344;
            color: #fff;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            border-color: #ff3366;
            outline: none;
            box-shadow: 0 0 8px rgba(255, 51, 102, 0.2);
        }
        input.invalid-email {
            border-color: #ff6666;
            box-shadow: 0 0 8px rgba(255, 102, 102, 0.3);
        }
        .email-error {
            color: #ff6666;
            font-size: 11px;
            margin-top: 5px;
            display: none;
        }
        
        .custom-member-zone {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: #20202b;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ff3366;
            margin-top: 5px;
        }

        .roles-checkbox-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: #0d0d12;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333344;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e1e1e6;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }
        .checkbox-item input {
            cursor: pointer;
            accent-color: #ff3366;
            width: 16px;
            height: 16px;
        }
        .checkbox-item:hover {
            color: #fff;
        }

        .custom-role-input-zone {
            display: none;
            margin-top: 12px;
            padding: 12px;
            background: #20202b;
            border-radius: 8px;
            border: 1px dashed #ff3366;
        }

        .preview-header {
            text-align: left;
            font-weight: bold;
            color: #888;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }
        .preview-area {
            background: #252530;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px dashed #444455;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .actions-container {
            display: flex;
            gap: 15px;
        }
        .btn-download {
            background: linear-gradient(135deg, #ff3366, #ff66cc);
            color: #fff;
            border: none;
            padding: 16px 40px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3);
            transition: all 0.2s;
            flex: 1;
        }
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 51, 102, 0.4);
        }
        .btn-bulk {
            background: linear-gradient(135deg, #33cc99, #139975);
            box-shadow: 0 4px 15px rgba(19, 153, 117, 0.3);
        }
        .btn-bulk:hover {
            box-shadow: 0 6px 20px rgba(19, 153, 117, 0.4);
        }

        /* MODAL STYLES */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: #1a1a22;
            border: 2px solid #ff3366;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(255, 51, 102, 0.3);
        }
        .modal-header {
            color: #ff3366;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .modal-field {
            margin-bottom: 20px;
        }
        .modal-field label {
            display: block;
            margin-bottom: 8px;
            color: #ff3366;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .modal-field input {
            width: 100%;
            box-sizing: border-box;
            background: #0d0d12;
            border: 1px solid #333344;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        .modal-field input:focus {
            border-color: #ff3366;
            outline: none;
            box-shadow: 0 0 8px rgba(255, 51, 102, 0.2);
        }
        .modal-roles {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: #0d0d12;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333344;
            margin-bottom: 20px;
        }
        .modal-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e1e1e6;
            font-size: 12px;
            cursor: pointer;
        }
        .modal-checkbox input {
            width: auto;
            accent-color: #ff3366;
            cursor: pointer;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
        }
        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .modal-btn-confirm {
            background: linear-gradient(135deg, #ff3366, #ff66cc);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3);
        }
        .modal-btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 51, 102, 0.4);
        }
        .modal-btn-cancel {
            background: #333344;
            color: #aaa;
        }
        .modal-btn-cancel:hover {
            background: #444455;
            color: #ddd;
        }
    </style>
</head>
<body>

                                <span>@LA1337RADIO</span>

                            <div style="display: inline-flex; align-items: center; margin-left: 10px; font-size: 10px; font-weight: bold; color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,1);">

    <div class="actions-container">

<!-- MODAL NOUVEAU MEMBRE -->
<div id="modalNewMember" class="modal-overlay">

        <div class="modal-field">
            <label>Nom Prénom</label>

            <button class="modal-btn modal-btn-confirm" onclick="confirmNewMember()">✓ Valider</button>

<script src="team.js"></script>

<script>
    const base64Cache = {};

    function initRolesCheckboxes() {
        const container = document.getElementById('rolesContainer');
        container.innerHTML = '';
        for (const [code, name] of Object.entries(ROLE_MAP)) {
            const label = document.createElement('label');
            label.className = 'checkbox-item';
            label.innerHTML = `<input type="checkbox" name="roleCheck" value="${code}" onchange="updateSig()"> ${name}`;
            container.appendChild(label);
        }
        
        const customLabel = document.createElement('label');
        customLabel.className = 'checkbox-item';
        customLabel.style.color = '#ff3366';
        customLabel.style.fontWeight = 'bold';
        customLabel.innerHTML = `<input type="checkbox" id="chkCustomRole" onchange="toggleCustomRoleInput()"> ✍️ [Rôle personnalisé]`;
        container.appendChild(customLabel);
    }

    function toggleCustomRoleInput() {
        var chk = document.getElementById('chkCustomRole');
        var zone = document.getElementById('customRoleInputZone');
        if (chk.checked) {
            zone.style.display = 'block';
        } else {
            zone.style.display = 'none';
            document.getElementById('inCustomRoleText').value = '';
        }
        updateSig();
    }

    function initMemberSelector() {
        var select = document.getElementById('inMemberSelect');
        select.innerHTML = '';
        
        var optPlaceholder = document.createElement('option');
        optPlaceholder.value = '';
        optPlaceholder.innerText = '👥 Choisissez un membre';
        optPlaceholder.selected = true;
        optPlaceholder.disabled = true;
        select.appendChild(optPlaceholder);
        
        var optCustom = document.createElement('option');
        optCustom.value = 'custom';
        optCustom.innerText = '✍️ [NOUVEAU MEMBRE - Saisie libre]';
        select.appendChild(optCustom);
        
        TEAM_DATABASE.forEach(function(member) {
            var opt = document.createElement('option');
            opt.value = member.id;
            opt.innerText = member.name;
            select.appendChild(opt);
        });
    }

    function initThemeSelector() {
        var select = document.getElementById('inPresetTheme');
        select.innerHTML = '';
        for (const key in THEME_IMAGES) {
            var opt = document.createElement('option');
            opt.value = key;
            opt.innerText = THEME_IMAGES[key].name;
            select.appendChild(opt);
        }
    }

    function initLogoSelector() {
        var select = document.getElementById('inPresetLogo');
        select.innerHTML = '';
        for (const key in LOGO_IMAGES) {
            var opt = document.createElement('option');
            opt.value = key;
            opt.innerText = LOGO_IMAGES[key].name;
            select.appendChild(opt);
        }
    }

    function setSecureImage(url, targetId, isBackground, callback) {
        if (base64Cache[url]) { 
            applyImageToTarget(base64Cache[url], targetId, isBackground); 
            if(callback) callback();
            return; 
        }
        const img = new Image(); img.crossOrigin = "Anonymous";
        img.onload = function() {
            const canvas = document.createElement("canvas"); canvas.width = img.width; canvas.height = img.height;
            canvas.getContext("2d").drawImage(img, 0, 0); base64Cache[url] = canvas.toDataURL("image/png");
            applyImageToTarget(base64Cache[url], targetId, isBackground);
            if(callback) callback();
        }; img.src = url;
    }

    function applyImageToTarget(dataUrl, targetId, isBackground) {
        const element = document.getElementById(targetId);
        if (isBackground) { element.style.background = `url('${dataUrl}') center/cover`; } else { element.src = dataUrl; }
    }

    window.onload = function() {
        loadCustomMembers();
        initRolesCheckboxes(); 
        initMemberSelector();
        initThemeSelector(); 
        initLogoSelector();  
        
        const firstThemeKey = Object.keys(THEME_IMAGES)[0];
        const firstLogoKey = Object.keys(LOGO_IMAGES)[0];

        setSecureImage(THEME_IMAGES[firstThemeKey].url, 'sigPreview', true);
        setSecureImage(LOGO_IMAGES[firstLogoKey].url, 'logoPreview', false);
        applyPresetTheme();
    };

    function applyPresetLogo() { 
        var logoKey = document.getElementById('inPresetLogo').value;
        if (LOGO_IMAGES[logoKey]) setSecureImage(LOGO_IMAGES[logoKey].url, 'logoPreview', false); 
        updateSig(); 
    }
    
    function applyPresetTheme() { 
        var themeKey = document.getElementById('inPresetTheme').value; 
        var themeData = THEME_IMAGES[themeKey];
        if (themeData) {
            setSecureImage(themeData.url, 'sigPreview', true);
            
            document.getElementById('outName').style.color = themeData.textColor;
            document.getElementById('outUrlText').style.color = themeData.textColor;
            document.getElementById('borderContainer').style.borderRightColor = themeData.textColor;
            document.getElementById('iconMail').style.color = themeData.textColor;
            document.getElementById('iconPhone').style.color = themeData.textColor;
            
            document.getElementById('outRole').style.color = themeData.roleColor;
            
            document.getElementById('liveBadge').style.backgroundColor = themeData.liveBgColor;
            document.getElementById('liveBadge').style.color = themeData.liveTxtColor;
        }
        updateSig(); 
    }

    function handleMemberChange() {
        var choice = document.getElementById('inMemberSelect').value;
        var customZone = document.getElementById('customMemberZone');
        var checkboxes = document.getElementsByName('roleCheck');
        
        if (choice === '') {
            return;
        } else if (choice === 'custom') {
            openModalNewMember();
        } else {
            customZone.style.display = 'none';
            var data = TEAM_DATABASE.find(m => m.id === choice);
            if (data && data.roles) {
                for (var i = 0; i < checkboxes.length; i++) {
                    checkboxes[i].checked = data.roles.includes(parseInt(checkboxes[i].value));
                }
            }
        }
        updateSig();
    }

    function forceInjectMemberData(memberObj) {
        document.getElementById('outName').innerText = memberObj.name; 
        document.getElementById('outMail').innerText = memberObj.mail;
        if(memberObj.phone && memberObj.phone.trim() !== "") { 
            document.getElementById('outPhoneContainer').style.display = 'inline'; 
            document.getElementById('outPhone').innerText = memberObj.phone; 
        } else { 
            document.getElementById('outPhoneContainer').style.display = 'none'; 
        }
    }

    function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
    }

    function updateSig() {
        var sigStyle = document.getElementById('inSigStyle').value;
        var groupTheme = document.getElementById('groupPresetTheme');
        var groupLogo = document.getElementById('groupPresetLogo');
        var radioPreview = document.getElementById('sigPreview');
        var banalPreview = document.getElementById('sigBanalPreview');

        var choice = document.getElementById('inMemberSelect').value;
        var name = 'Prénom NOM';
        var mail = 'contact@la1337.com';
        var phone = '03 65 17 00 63';

        if (choice === 'custom') {
            name = document.getElementById('inCustomName').value || 'Prénom NOM';
            mail = document.getElementById('inCustomMail').value || 'contact@la1337.com';
            phone = document.getElementById('inCustomPhone').value || '03 65 17 00 63';
            
            const mailInput = document.getElementById('inCustomMail');
            const emailError = document.getElementById('emailError');
            if (mail && mail !== 'contact@la1337.com' && !isValidEmail(mail)) {
                mailInput.classList.add('invalid-email');
                emailError.style.display = 'block';
            } else {
                mailInput.classList.remove('invalid-email');
                emailError.style.display = 'none';
            }
        } else if (choice !== '') {
            var data = TEAM_DATABASE.find(m => m.id === choice);
            if (data) {
                name = data.name;
                mail = data.mail;
                phone = data.phone || '03 65 17 00 63';
                forceInjectMemberData(data);
            }
        }

        var checkboxes = document.getElementsByName('roleCheck');
        var selectedRolesNames = [];
        for (var i = 0; i < checkboxes.length; i++) {
            if (checkboxes[i].checked) {
                var codeCoche = parseInt(checkboxes[i].value);
                selectedRolesNames.push(ROLE_MAP[codeCoche]);
            }
        }
        var chkCustom = document.getElementById('chkCustomRole');
        var customTxt = document.getElementById('inCustomRoleText').value.trim();
        if (chkCustom && chkCustom.checked && customTxt !== "") {
            selectedRolesNames.push(customTxt);
        }

        var rolesString = selectedRolesNames.join(' / ');

        if (sigStyle === 'radio') {
            groupTheme.style.display = 'flex';
            groupLogo.style.display = 'flex';
            radioPreview.style.display = 'block';
            banalPreview.style.display = 'none';
            document.getElementById('outRole').innerText = rolesString || 'Votre Rôle / Poste';
        } else {
            groupTheme.style.display = 'none';
            groupLogo.style.display = 'none';
            radioPreview.style.display = 'none';
            banalPreview.style.display = 'block';
            banalPreview.innerHTML = generateBanalSignature(name, rolesString, mail, phone, sigStyle);
        }
    }

    function generateAndDownloadImage() {
        var sigStyle = document.getElementById('inSigStyle').value;
        var choice = document.getElementById('inMemberSelect').value;
        
        if (choice === 'custom') {
            var mail = document.getElementById('inCustomMail').value;
            if (mail && mail !== 'contact@la1337.com' && !isValidEmail(mail)) {
                alert('❌ Veuillez entrer un email valide (ex: nom@domaine.com)');
                return;
            }
        }
        
        var container = (sigStyle === 'radio') ? document.getElementById('sigPreview') : document.getElementById('sigBanalPreview');
        var logo = document.getElementById('logoPreview');
        var name = 'signature';
        if (choice === 'custom') { name = document.getElementById('inCustomName').value || 'signature'; } else { var data = TEAM_DATABASE.find(m => m.id === choice); if(data) name = data.name; }
        var cleanName = name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '-');
        
        if (sigStyle === 'radio' && !logo.complete) { setTimeout(generateAndDownloadImage, 100); return; }
        
        html2canvas(container, { backgroundColor: (sigStyle === 'radio' ? null : '#1a1a22'), logging: false, scale: 2, useCORS: true, allowTaint: false }).then(function(canvas) {
            var link = document.createElement('a'); 
            link.download = 'signature-' + cleanName + '.png';
            link.href = canvas.toDataURL('image/png'); 
            link.click();
        });
    }

    function generateAllSignaturesZip() {
        const btn = document.getElementById('bulkBtn');
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = "⏳ Génération en cours...";

        const sigStyle = document.getElementById('inSigStyle').value;
        const container = (sigStyle === 'radio') ? document.getElementById('sigPreview') : document.getElementById('sigBanalPreview');
        const zip = new JSZip();
        let index = 0;

        const previousChoice = document.getElementById('inMemberSelect').value;

        function processNext() {
            if (index >= TEAM_DATABASE.length) {
                btn.innerText = "⚡ Création du ZIP...";
                zip.generateAsync({ type: "blob" }).then(function(content) {
                    var theme = document.getElementById('inPresetTheme').value;
                    var link = document.createElement('a');
                    link.download = `signatures-la1337-${sigStyle}.zip`;
                    link.href = URL.createObjectURL(content);
                    link.click();
                    
                    document.getElementById('inMemberSelect').value = previousChoice;
                    updateSig();
                    btn.disabled = false;
                    btn.innerText = originalText;
                });
                return;
            }

            const currentMember = TEAM_DATABASE[index];
            btn.innerText = `⏳ (${index + 1}/${TEAM_DATABASE.length}) ${currentMember.name}`;
            
            document.getElementById('inMemberSelect').value = currentMember.id;
            var checkboxes = document.getElementsByName('roleCheck');
            for (var i = 0; i < checkboxes.length; i++) {
                var val = parseInt(checkboxes[i].value);
                checkboxes[i].checked = (currentMember.roles && currentMember.roles.includes(val));
            }
            updateSig();

            setTimeout(function() {
                html2canvas(container, { backgroundColor: (sigStyle === 'radio' ? null : '#1a1a22'), logging: false, scale: 2, useCORS: true, allowTaint: false }).then(function(canvas) {
                    var cleanName = currentMember.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '-');
                    var dataUrl = canvas.toDataURL('image/png');
                    var base64Data = dataUrl.split(',')[1];
                    
                    zip.file(`signature-${cleanName}.png`, base64Data, { base64: true });
                    index++;
                    processNext();
                });
            }, 60);
        }

        processNext();
    }

    // ===== FONCTIONS MODAL NOUVEAU MEMBRE =====
    function initModalRoles() {
        const container = document.getElementById('modalRolesContainer');
        container.innerHTML = '';
        for (const [code, name] of Object.entries(ROLE_MAP)) {
            const label = document.createElement('label');
            label.className = 'modal-checkbox';
            label.innerHTML = `<input type="checkbox" name="modalRole" value="${code}"> ${name}`;
            container.appendChild(label);
        }
    }

    function openModalNewMember() {
        initModalRoles();
        document.getElementById('modalName').value = '';
        document.getElementById('modalMail').value = '';
        document.getElementById('modalPhone').value = '';
        document.getElementById('modalEmailError').style.display = 'none';
        const checkboxes = document.querySelectorAll('input[name="modalRole"]');
        checkboxes.forEach(cb => cb.checked = false);
        document.getElementById('modalNewMember').classList.add('active');
    }

    function closeModalNewMember() {
        document.getElementById('modalNewMember').classList.remove('active');
        document.getElementById('inMemberSelect').value = '';
        handleMemberChange();
    }

    function confirmNewMember() {
        const name = document.getElementById('modalName').value.trim();
        const mail = document.getElementById('modalMail').value.trim();
        const phone = document.getElementById('modalPhone').value.trim();
        const emailError = document.getElementById('modalEmailError');
        const mailInput = document.getElementById('modalMail');

        if (mail && !isValidEmail(mail)) {
            emailError.style.display = 'block';
            mailInput.classList.add('invalid-email');
            return;
        }
        emailError.style.display = 'none';
        mailInput.classList.remove('invalid-email');

        if (!name) {
            alert('❌ Veuillez entrer un nom');
            return;
        }

        const checkboxes = document.querySelectorAll('input[name="modalRole"]');
        const selectedRoles = [];
        checkboxes.forEach(cb => {
            if (cb.checked) {
                selectedRoles.push(parseInt(cb.value));
            }
        });

        const newMember = {
            name: name,
            mail: mail || 'contact@la1337.com',
            phone: phone || '',
            roles: selectedRoles
        };

        addCustomMember(newMember);
        forceInjectMemberData(newMember);
        document.getElementById('modalNewMember').classList.remove('active');
        document.getElementById('inMemberSelect').value = 'custom';
        updateSig();
    }

    window.addEventListener('DOMContentLoaded', function() {
        initModalRoles();
    });

    document.getElementById('modalNewMember').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModalNewMember();
        }
    });

    document.addEventListener('keydown', function(e) {
        const modal = document.getElementById('modalNewMember');
        if (modal.classList.contains('active') && e.key === 'Enter') {
            confirmNewMember();
        }
    });
</script>
